kind = "web"
previewPath = "/"
title = "Julia Center - مركز جوليا"
version = "1.0.0"
id = "artifacts/julia-center"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19937

[services.development]
run = "pnpm --filter @workspace/julia-center run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/julia-center", "run", "build" ]
publicDir = "artifacts/julia-center/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19937"
BASE_PATH = "/"
